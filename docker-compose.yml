services:
  processing:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: scielo-processing:latest
    platform: linux/amd64
    environment:
      PROCESSING_SETTINGS_FILE: /etc/scieloapps/processing.ini
      DOCKER_ENV: "1"
      WORK_DIR: /app
      LOG_DIR: /var/log/processing
      TABS_DIR: /var/www/static_scielo_org/tabs
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      # Arquivo de configuração com os thrift servers (obrigatório)
      - /etc/scieloapps/processing.ini:/etc/scieloapps/processing.ini:ro
      # Diretório de saída dos ZIPs gerados (obrigatório)
      - /var/www/static_scielo_org/tabs:/var/www/static_scielo_org/tabs
      # Logs persistentes (opcional)
      - /var/log/processing:/var/log/processing
