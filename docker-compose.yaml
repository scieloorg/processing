services:
  processing:
    build:
      context: .
    image: scielo-processing:python3.14
    environment:
      PROCESSING_SETTINGS_FILE: ${PROCESSING_SETTINGS_FILE:-}
      ARTICLEMETA_THRIFTSERVER: ${ARTICLEMETA_THRIFTSERVER:-articlemeta.scielo.org:11621}
      RATCHET_THRIFTSERVER: ${RATCHET_THRIFTSERVER:-ratchet.scielo.org:11649}
      PUBLICATIONSTATS_THRIFTSERVER: ${PUBLICATIONSTATS_THRIFTSERVER:-publication.scielo.org:11620}
      PUBLICATIONSTATS_TIMEOUT_MS: ${PUBLICATIONSTATS_TIMEOUT_MS:-60000}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      LOG_DIR: /var/log/processing
      TABS_DIR: /var/www/static_scielo_org/tabs
    volumes:
      - .:/app
      - ./var/log/processing:/var/log/processing
      - ./var/tabs:/var/www/static_scielo_org/tabs

  tests:
    image: scielo-processing:python3.14
    build:
      context: .
    entrypoint: ["python", "-m", "unittest", "discover", "-s", "tests", "-v"]
    environment:
      PROCESSING_SETTINGS_FILE: /app/config.ini-TEMPLATE
    volumes:
      - .:/app
